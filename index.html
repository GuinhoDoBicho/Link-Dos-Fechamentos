<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guinho do Bicho - Ordem dos Fechamentos</title>
    <style>
        /* Documentação: Reset e Bloqueio de Seleção */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Verdana', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0d0d0d;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- CAMADA DE MOVIMENTO NO PLANO DE FUNDO --- */
        .background-animado {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Imagem de pergaminho/AC de fundo */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('https://www.transparenttextures.com/patterns/papyros.png'),
                        linear-gradient(135deg, #2b0000 0%, #000 100%);
            z-index: -2;
        }

        /* Efeito de Brasas/Partículas flutuantes */
        .particulas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: radial-gradient(#ffcc00 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveParticulas 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveParticulas {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        /* --- ESTILO DO CONTEÚDO --- */
        .perfil {
            text-align: center;
            margin-bottom: 40px;
            z-index: 1;
        }

        .perfil img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #ffcc00; /* Amarelo Dourado */
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .perfil img:hover {
            transform: rotate(360s); /* Pequena referência ao sincronismo */
        }

        .perfil h1 {
            margin-top: 20px;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffcc00;
            text-shadow: 3px 3px 5px #000;
        }

        .container-links {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1;
        }

        .botao-link {
            background: linear-gradient(90deg, #8b0000 0%, #cc0000 50%, #8b0000 100%);
            color: #ffcc00; /* Texto Amarelo */
            text-decoration: none;
            text-align: center;
            padding: 18px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid #ffcc00;
            border-right: 5px solid #ffcc00;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho ao passar o mouse */
        .botao-link::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 204, 0, 0.4), transparent);
            transition: 0.5s;
        }

        .botao-link:hover::after {
            left: 100%;
        }

        .botao-link:hover {
            transform: scale(1.05);
            background: #ffcc00;
            color: #8b0000;
            border-left: 5px solid #8b0000;
            border-right: 5px solid #8b0000;
        }

        .footer-logo {
            margin-top: auto;
            padding-top: 40px;
            color: #ffcc00;
            font-size: 10px;
            letter-spacing: 5px;
            opacity: 0.5;
            text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Fundo Temático com Movimento -->
    <div class="background-animado"></div>
    <div class="particulas"></div>

    <div class="perfil">
        <img src="https://i.ibb.co/JWGwXQZj/Gemini-Generated-Image-nd6belnd6belnd6b-1.png" alt="Guinho do Bicho">
        <h1>Guinho do Bicho</h1>
    </div>

    <div class="container-links">
        <a href="https://guinhodobicho.github.io/Milha-Acertiva" class="botao-link">Milha Assertiva</a>
        <a href="https://guinhodobicho.github.io/Calculadora-De-Probabilidade" class="botao-link">Calculadora de Probabilidades</a>
        <a href="https://guinhodobicho.github.io/Super-Centenas-Combinadas" class="botao-link">Super Centenas Invertidas</a>
        <a href="https://guinhodobicho.github.io/Gerenciador-De-Gastos" class="botao-link">Gerenciador de Finanças</a>
        <a href="https://guinhodobicho.github.io/Ternos-De-Grupos-Magicos" class="botao-link">Terno de Grupo Mágico</a>
        <a href="https://guinhodobicho.github.io/Rob-Analisador-Bicho" class="botao-link">Robô Analisador do Bicho</a>
        <a href="https://guinhodobicho.github.io/Rob-Analisador-Alternativas" class="botao-link">Robô Analisador das Alternativas</a>
    </div>

    <div class="footer-logo">NADA É VERDADE, TUDO É PERMITIDO</div>

    <!-- Script de Segurança (Bloqueio de Código) -->
    <script>
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        };
    </script>
</body>
</html>
